<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salgados Express - Calculador de Diferença</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #D4AF37; --text: #ffffff; --border: #333; --diff: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--accent); margin-bottom: 20px; }
        h1 { color: var(--accent); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem; text-align: center;
        }
        .btn:active { background: var(--accent); color: var(--bg); }
        .btn-calc { border-color: var(--diff); color: var(--diff); }
        #inventory-list { display: grid; gap: 8px; }
        .item-card { background: var(--card); border-left: 4px solid var(--border); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-radius: 4px; }
        .item-card.active { border-left-color: var(--accent); }
        .item-card.is-diff { border-left-color: var(--diff); background: #1a251e; }
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 40px; height: 40px; border-radius: 5px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 1.3rem; display: flex; align-items: center; justify-content: center; }
        .qty-input { width: 45px; text-align: center; background: transparent; border: none; color: white; font-size: 1rem; font-weight: bold; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        input[type="file"] { display: none; }
        .id-badge { font-size: 0.6rem; color: #666; margin-right: 5px; }
        .info-msg { font-size: 0.7rem; color: #aaa; grid-column: span 2; text-align: center; margin-top: -5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header><h1>Estoque de Salgados</h1></header>

    <div class="controls">
        <label class="btn" for="doc-import">📥 IMPORTAR PDF</label>
        <input type="file" id="doc-import" accept=".pdf,application/pdf">

        <button class="btn" onclick="saveAsBase()">💾 SALVAR COMO BASE</button>
        
        <button class="btn btn-calc" onclick="calculateDifference()">🧮 CALCULAR DIFERENÇA</button>
        
        <button class="btn" onclick="exportPDF()">📄 GERAR PDF FINAL</button>

        <div class="info-msg" id="status-msg">Importe o PDF e salve como base para calcular a diferença.</div>

        <button class="btn" onclick="clearData()" style="border-color: #666; color: #666; grid-column: span 2;">ZERAR TUDO</button>
    </div>

    <div id="inventory-list"></div>

    <div class="loading-overlay" id="loader">
        <div style="color: var(--accent); margin-bottom: 10px;">Lendo dados do PDF...</div>
        <div id="progress" style="font-size: 1.5rem; color: white;">Processando...</div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const DATA_BASE = [
            { id: 1, nome: "Atum" }, { id: 2, nome: "Berinjela" }, { id: 3, nome: "Brasileiro" },
            { id: 4, nome: "Brócolis" }, { id: 5, nome: "Bauru" }, { id: 6, nome: "Carne com queijo" },
            { id: 7, nome: "Carne" }, { id: 8, nome: "Carne com cheddar" }, { id: 9, nome: "Calabresa" },
            { id: 10, nome: "Calabresa com catupiry" }, { id: 11, nome: "Caipira" }, { id: 12, nome: "Carne seca" },
            { id: 13, nome: "Chips" }, { id: 14, nome: "Escarola" }, { id: 15, nome: "Especial de carne" },
            { id: 16, nome: "Frango com catupiry" }, { id: 17, nome: "Mini de carne" }, { id: 18, nome: "Mini palmito" },
            { id: 19, nome: "Palmito" }, { id: 20, nome: "Palmito com catupiry" }, { id: 21, nome: "Pizza" },
            { id: 22, nome: "Portuguesa" }, { id: 23, nome: "Queijo" }, { id: 24, nome: "Quatro queijos" },
            { id: 25, nome: "Kibe" }, { id: 26, nome: "Bolinho de carne" }, { id: 27, nome: "Bolinho de bacalhau" },
            { id: 28, nome: "Bolinho de queijo" }, { id: 29, nome: "Coxinha" }, { id: 30, nome: "Risole" },
            { id: 31, nome: "Casquinha" }, { id: 32, nome: "Camarão" }, { id: 33, nome: "Pepperoni com queijo" },
            { id: 34, nome: "Pastel de carne com ovo" }, { id: 35, nome: "Especial de frango" }, { id: 36, nome: "Frango com queijo" },
            { id: 37, nome: "Milho com catupiry e queijo" }, { id: 38, nome: "Costela com queijo" }, 
            { id: 39, nome: "Bolinho de carne seca" }, { id: 40, nome: "Bolinho de brócolis com queijo" }, 
            { id: 41, nome: "Coxinha de catupiry" }
        ];

        let db = JSON.parse(localStorage.getItem('salgados_db_v3')) || DATA_BASE.map(item => ({ ...item, qtd: 0 }));
        let isCalculated = false;

        function render() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            db.forEach((item) => {
                const div = document.createElement('div');
                div.className = `item-card ${item.qtd !== 0 ? 'active' : ''} ${isCalculated ? 'is-diff' : ''}`;
                div.innerHTML = `
                    <div class="item-name"><span class="id-badge">#${item.id}</span>${item.nome}</div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="upd(${item.id},-1)">-</button>
                        <input type="number" class="qty-input" value="${item.qtd}" onchange="set(${item.id},this.value)">
                        <button class="qty-btn" onclick="upd(${item.id},1)">+</button>
                    </div>`;
                list.appendChild(div);
            });
            if(!isCalculated) localStorage.setItem('salgados_db_v3', JSON.stringify(db));
        }

        function upd(id, v) { 
            const item = db.find(i => i.id === id);
            if(item) { item.qtd = (parseInt(item.qtd) || 0) + v; render(); }
        }
        function set(id, v) { 
            const item = db.find(i => i.id === id);
            if(item) { item.qtd = parseInt(v) || 0; render(); }
        }

        function saveAsBase() {
            localStorage.setItem('last_pdf_values', JSON.stringify(db));
            document.getElementById('status-msg').innerText = "✅ Base salva! Agora ajuste os valores atuais e clique em CALCULAR.";
            alert("Estoque atual salvo como base de comparação.");
        }

        function calculateDifference() {
            const baseStr = localStorage.getItem('last_pdf_values');
            if(!baseStr) {
                alert("Você precisa salvar uma BASE primeiro para poder calcular a diferença.");
                return;
            }
            const baseData = JSON.parse(baseStr);
            
            db = db.map(item => {
                const baseItem = baseData.find(b => b.id === item.id);
                const baseQtd = baseItem ? baseItem.qtd : 0;
                return { ...item, qtd: item.qtd - baseQtd };
            });

            isCalculated = true;
            document.getElementById('status-msg').innerText = "📊 Diferença calculada. Você já pode gerar o PDF.";
            render();
        }

        function clearData() { 
            if(confirm('Isso apagará tudo, inclusive a base salva. Deseja continuar?')) { 
                db = DATA_BASE.map(item => ({ ...item, qtd: 0 }));
                localStorage.removeItem('last_pdf_values');
                localStorage.removeItem('salgados_db_v3');
                isCalculated = false;
                document.getElementById('status-msg').innerText = "Dados resetados.";
                render(); 
            } 
        }

        // Função de importação via PDF (usando extração de texto direta do PDF)
        async function handleFile(file) {
            if(!file) return;
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();
                const textLines = textContent.items.map(item => item.str.toLowerCase());

                const fullText = textLines.join(" ");
                const sortedSearch = [...DATA_BASE].sort((a, b) => b.nome.length - a.nome.length);

                // Lógica de busca de valores no texto do PDF
                sortedSearch.forEach(item => {
                    const nomeSabor = item.nome.toLowerCase();
                    if (fullText.includes(nomeSabor)) {
                        // Tenta encontrar o número mais próximo após o nome do sabor
                        const regex = new RegExp(nomeSabor + "\\s*(\\d+)", "i");
                        const match = fullText.match(regex);
                        if (match) {
                            let localItem = db.find(i => i.id === item.id);
                            if(localItem) localItem.qtd = parseInt(match[1]);
                        }
                    }
                });
            } catch (e) { 
                alert("Erro ao ler o PDF. Certifique-se de que é um PDF com texto legível."); 
            }
            loader.style.display = 'none';
            isCalculated = false;
            render();
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 20;
            const titulo = isCalculated ? "RELATÓRIO DE DIFERENÇA" : "ESTOQUE ATUAL";

            doc.setFillColor(18, 18, 18); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(212, 175, 55); doc.setFontSize(16);
            doc.text(titulo, 105, y, { align: 'center' });
            
            y += 15; doc.setFontSize(10); doc.setTextColor(255, 255, 255);
            
            db.forEach(item => {
                if(item.qtd !== 0) {
                    doc.text(`${item.nome}`, 20, y); 
                    doc.text(String(item.qtd), 180, y, { align: 'right' });
                    y += 8;
                    if(y > 280) { doc.addPage(); y = 20; doc.setFillColor(18, 18, 18); doc.rect(0, 0, 210, 297, 'F'); }
                }
            });
            doc.save(isCalculated ? 'diferenca.pdf' : 'estoque.pdf');
        }

        document.getElementById('doc-import').onchange = e => handleFile(e.target.files[0]);
        render();
    </script>
</body>
</html>
