<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberPro - Gestão de Sabores</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #D4AF37;
            --text: #ffffff;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            padding-bottom: 80px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--accent);
            margin-bottom: 20px;
        }

        h1 { color: var(--accent); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn:active { background: var(--accent); color: var(--bg); }

        #inventory-list {
            display: grid;
            gap: 10px;
        }

        .item-card {
            background: var(--card);
            border-left: 4px solid var(--border);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 4px;
            transition: 0.3s;
        }

        .item-card.active { border-left-color: var(--accent); }

        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 1rem; margin-bottom: 4px; }
        .item-status { font-size: 0.75rem; color: #888; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-input {
            width: 45px;
            text-align: center;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Gestão de Pedidos</h1>
    </header>

    <div class="controls">
        <label class="btn" for="ocr-upload">📸 Escanear Foto</label>
        <input type="file" id="ocr-upload" accept="image/*">
        
        <button class="btn" onclick="exportPDF()">📄 Exportar PDF</button>
        <button class="btn" onclick="document.getElementById('import-upload').click()">📥 Importar</button>
        <input type="file" id="import-upload" accept="image/*, .json" onchange="handleImport(this)">
    </div>

    <div id="inventory-list"></div>

    <div class="loading-overlay" id="loader">
        <div style="color: var(--accent); margin-bottom: 10px;">Processando Documento...</div>
        <div id="progress">0%</div>
    </div>

    <script>
        const saboresIniciais = [
            "Atum", "Berinjela", "Brasileiro", "Brócolis", "Bauru", "Carne com queijo", 
            "Carne", "Carne com cheddar", "Calabresa", "Calabresa com catupiry", "Caipira", 
            "Carne seca", "Chips", "Escarola", "Especial de carne", "Frango com catupiry", 
            "Mini de carne", "Mini palmito", "Palmito", "Palmito com catupiry", "Pizza", 
            "Portuguesa", "Queijo", "Quatro queijos", "Kibe", "Bolinho de carne", 
            "Bolinho de bacalhau", "Bolinho de queijo", "Coxinha", "Risole", "Casquinha", 
            "Camarão", "Pepperoni com queijo", "Pastel de carne com ovo", "Especial de frango", 
            "Frango com queijo", "Milho com catupiry e queijo", "Costela com queijo", 
            "Bolinho de carne seca", "Bolinho de brócolis com queijo", "Coxinha de catupiry"
        ];

        let db = JSON.parse(localStorage.getItem('barberPro_estoque')) || 
                 saboresIniciais.map(s => ({ nome: s, qtd: 0 }));

        function render() {
            const container = document.getElementById('inventory-list');
            container.innerHTML = '';

            db.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `item-card ${item.qtd > 0 ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="item-info">
                        <div class="item-name">${item.nome}</div>
                        <div class="item-status">${item.qtd > 0 ? 'Selecionado' : 'Zerarado'}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQtd(${index}, -1)">-</button>
                        <input type="number" class="qty-input" value="${item.qtd}" 
                               onchange="manualUpdate(${index}, this.value)">
                        <button class="qty-btn" onclick="updateQtd(${index}, 1)">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
            localStorage.setItem('barberPro_estoque', JSON.stringify(db));
        }

        function updateQtd(index, val) {
            db[index].qtd = Math.max(0, db[index].qtd + val);
            render();
        }

        function manualUpdate(index, val) {
            db[index].qtd = Math.max(0, parseInt(val) || 0);
            render();
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const date = new Date().toLocaleString();
            
            doc.setFontSize(18);
            doc.setTextColor(212, 175, 55);
            doc.text("Relatório de Pedidos - BarberPro", 20, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`Gerado em: ${date}`, 20, 28);
            
            doc.setDrawColor(212, 175, 55);
            doc.line(20, 32, 190, 32);

            let y = 40;
            doc.setFontSize(12);
            doc.setTextColor(0);
            
            const itensComQtd = db.filter(i => i.qtd > 0);
            
            if(itensComQtd.length === 0) {
                doc.text("Nenhum item selecionado.", 20, y);
            } else {
                itensComQtd.forEach(item => {
                    if (y > 270) { doc.addPage(); y = 20; }
                    doc.text(`${item.nome}:`, 20, y);
                    doc.text(`${item.qtd}`, 170, y, { align: 'right' });
                    y += 8;
                });
            }

            const rawData = JSON.stringify(db);
            doc.setFontSize(1);
            doc.setTextColor(255, 255, 255); 
            doc.text(rawData, 10, 290);

            doc.save(`pedido_${new Date().getTime()}.pdf`);
        }

        function handleImport(input) {
            const file = input.files[0];
            if (!file) return;

            if (file.type === "application/json") {
                const reader = new FileReader();
                reader.onload = e => {
                    db = JSON.parse(e.target.result);
                    render();
                };
                reader.readAsText(file);
            } else {
                runOCR(file);
            }
        }

        function runOCR(file) {
            const loader = document.getElementById('loader');
            const progress = document.getElementById('progress');
            loader.style.display = 'flex';

            Tesseract.recognize(file, 'por', {
                logger: m => { if (m.status === 'recognizing text') progress.innerText = Math.round(m.progress * 100) + '%'; }
            }).then(({ data: { text } }) => {
                processTextData(text);
                loader.style.display = 'none';
            });
        }

        function processTextData(text) {
            const lines = text.toLowerCase().split('\n');
            db.forEach(item => {
                lines.forEach(line => {
                    if (line.includes(item.nome.toLowerCase())) {
                        const match = line.match(/\d+/);
                        if (match) item.qtd = parseInt(match[0]);
                    }
                });
            });
            render();
        }

        render();
    </script>
</body>
</html>
