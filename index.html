<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #D4AF37; --text: #ffffff; --border: #333; --diff: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--accent); margin-bottom: 20px; }
        h1 { color: var(--accent); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        
      .store-selector { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 4px; /* Diminuí um pouco o espaço entre elas */
    margin-bottom: 15px; 
    justify-content: center; 
}
        .store-btn { 
    /* Diminuí o padding lateral de 12px para 6px e o vertical de 8px para 5px */
    padding: 5px 6px; 
    border: 1px solid #444; 
    background: #222; 
    color: #888; 
    border-radius: 4px; 
    cursor: pointer; 
    /* Diminuí a fonte de 0.75rem para 0.65rem */
    font-size: 0.65rem; 
    text-transform: uppercase;
    /* Adicionei esta linha para evitar que o texto quebre linha no meio do nome */
    white-space: nowrap; 
}
        .store-btn.active { border-color: var(--accent); color: var(--accent); background: #2a2410; }
        .add-store { background: var(--accent); color: var(--bg); font-weight: bold; width: 35px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        .btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 5px; border-radius: 5px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.75rem; text-align: center;
            height: 55px; text-transform: uppercase;
        }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        .btn-prod { border-color: var(--diff); color: var(--diff); grid-column: span 2; }
        
        #inventory-list { display: grid; gap: 8px; }
        .item-card { background: var(--card); border-left: 4px solid var(--border); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-radius: 4px; }
        .item-card.active { border-left-color: var(--accent); }
        
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 40px; height: 40px; border-radius: 5px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 1.3rem; }
        .qty-input { width: 45px; text-align: center; background: transparent; border: none; color: white; font-size: 1rem; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--accent); width: 100%; max-width: 400px; }
        .modal h2 { color: var(--accent); margin-bottom: 15px; font-size: 1.1rem; text-align: center; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 1rem; }
        .check-item input { width: 20px; height: 20px; accent-color: var(--accent); }

        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>

window.confirm = function(msg) { console.log("Confirm bloqueado: " + msg); return true; };
        const URL_API = "https://script.google.com/macros/s/AKfycbxPxnJDYGsBKjOKf7Q5MuqAZ0jHwPFAINfVmJJ7mWeUfWIiFnvIpKVbt85r7whCkjzh/exec";

            { id: 31, nome: "Casquinha" }, { id: 32, nome: "Camarão" }, { id: 33, nome: "Pepperoni com queijo" },
            { id: 34, nome: "Pastel de carne com ovo" }, { id: 35, nome: "Especial de frango" }, { id: 36, nome: "Frango com queijo" },
            { id: 37, nome: "Milho com catupiry e queijo" }, { id: 38, nome: "Costela com queijo" },

            { id: 41, nome: "Coxinha de catupiry" }

        let stores = JSON.parse(localStorage.getItem('stores_list')) || ["Vila Prudente", "Interlagos", "São Bernardo Max"];

        function renderStores() {

        let modoProducaoAtivo = false;

// 2. Função para alternar o modo
function toggleModoProducao() {
    modoProducaoAtivo = !modoProducaoAtivo;
    const btnToggle = document.getElementById('toggle-producao');
    const btnSalvar = document.getElementById('btn-salvar-nuvem');
    const btnBuscar = document.getElementById('btn-buscar-nuvem');
    const btnLimpar = document.getElementById('btn-limpar-tela');
    const btnImportar = document.getElementById('btn-importar');
    const botoesProducao = document.querySelectorAll('.modo-prod-apenas');

    if (modoProducaoAtivo) {
        // --- MODO ON ---
        btnToggle.style.backgroundColor = "var(--accent)";
        btnToggle.style.color = "var(--bg)";
        
        // 1. Linha: Buscar e Salvar
        btnBuscar.style.display = "flex";
        btnBuscar.style.order = "1";
        btnBuscar.style.gridColumn = "span 1";

        btnSalvar.style.order = "2";
        btnSalvar.style.gridColumn = "span 1";

        // 2. Linha: IMPORTAR (Forçando o aparecimento)
        if (btnImportar) {
            btnImportar.style.display = "flex";
            btnImportar.style.order = "3";
            btnImportar.style.gridColumn = "span 2";
        }

        // 3. Linha: Outros botões (PDF, etc)
        botoesProducao.forEach(btn => {
            if (btn.id !== 'btn-buscar-nuvem' && btn.id !== 'btn-importar') {
                btn.style.display = "flex";
                btn.style.order = "4";
                btn.style.gridColumn = "span 2";
            }
        });

        // Final: Limpar
        btnLimpar.style.order = "99";
        btnLimpar.style.gridColumn = "span 2";

    } else {
        // --- MODO OFF ---
        btnToggle.style.backgroundColor = "transparent";
        btnToggle.style.color = "var(--accent)";
        
        // Esconde tudo que é de produção
        botoesProducao.forEach(btn => btn.style.display = "none");

        // Salvar e Limpar dividem a primeira linha (50/50)
        btnSalvar.style.gridColumn = "span 1";
        btnSalvar.style.order = "0";
        btnLimpar.style.gridColumn = "span 1";
        btnLimpar.style.order = "0";
    }
}


        function render() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            db.forEach((item) => {
                const div = document.createElement('div');
                div.className = `item-card ${item.qtd !== 0 ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="item-name">#${item.id} - ${item.nome}</div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="upd(${item.id},-1)">-</button>
                        <input type="number" class="qty-input" value="${item.qtd}" onchange="set(${item.id},this.value)">
                        <button class="qty-btn" onclick="upd(${item.id},1)">+</button>
                    </div>`;
                list.appendChild(div);
            });
            localStorage.setItem('salgados_db_v3', JSON.stringify(db));
            document.getElementById('btn-ordem').disabled = !diffCalculated;
        }

        function upd(id, v) { 
            const item = db.find(i => i.id === id);
            if(item) { item.qtd = (parseInt(item.qtd) || 0) + v; render(); }
        }
        function set(id, v) { 
            const item = db.find(i => i.id === id);
            if(item) { item.qtd = parseInt(v) || 0; render(); }
        }

        function saveAsBase() {
            localStorage.setItem('last_pdf_base', JSON.stringify(db));
            alert("Base salva localmente!");
        }

    async function salvarNaNuvem() {
    document.getElementById('loader').style.display = 'flex';
    
    const acaoAtual = modoSalvarProducao ? "salvar_producao" : "salvar";
    
    // 1. Preparamos os itens garantindo que o valor seja numérico, incluindo o zero
    const itensTratados = db.map(item => ({
        id: item.id,
        nome: item.nome,
        qtd: Number(item.qtd) // Força a conversão para número, garantindo que 0 não seja ignorado
    }));

    const payload = { 
        acao: acaoAtual, 
        loja: activeStore, 
        items: itensTratados 
    };
    
    try {
        await fetch(URL_API, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify(payload)
        });
        
        console.log("Dados enviados (incluindo zerados) como: " + acaoAtual);
        
        // Reset de interface após sucesso
        modoSalvarProducao = false;
        const btnSalvar = document.getElementById('btn-salvar-nuvem');
        btnSalvar.innerText = "💾 SALVAR NA NUVEM";
        btnSalvar.style.borderColor = "var(--accent)";
        btnSalvar.style.color = "var(--accent)";
        
        // Opcional: Avisar o usuário no console ou em um elemento de texto na tela
        console.log("Salvo com sucesso!");
        
    } catch (e) { 
        console.error("Erro na conexão:", e);
    }
    document.getElementById('loader').style.display = 'none';
}
   function applyDifferenceToScreen() {
    if(!dadosOriginaisNuvem) { 
        alert("Busque da nuvem primeiro!"); 
        return; 
    }

    db = db.map(itemTela => {
        const itemBase = dadosOriginaisNuvem.find(b => b.id === itemTela.id);
        const qtdBase = itemBase ? (parseInt(itemBase.qtd) || 0) : 0;
        const qtdAtual = parseInt(itemTela.qtd) || 0;
        return { ...itemTela, qtd: qtdAtual - qtdBase };
    });

    diffCalculated = true;
    modoSalvarProducao = true; // ATIVA O MODO PRODUÇÃO
    render();
    
    // Altera visualmente o botão de salvar para dar feedback ao usuário
    const btnSalvar = document.getElementById('btn-salvar-nuvem');
    btnSalvar.innerText = "💾 SALVAR PRODUÇÃO";
    btnSalvar.style.borderColor = "var(--diff)";
    btnSalvar.style.color = "var(--diff)";
}
async function salvarProducao() {
    const loader = document.getElementById('loader');
    loader.style.display = 'flex';
    
    const payload = { 
        acao: "salvar_producao", 
        loja: activeStore, 
        items: db // Aqui 'db' já contém os valores subtraídos (a diferença)
    };
    
    try {
        await fetch(URL_API, {
            method: "POST",
            mode: "no-cors", // Crucial para rodar do PC
            body: JSON.stringify(payload)
        });
        alert("Produção enviada! Verifique a aba '" + activeStore + "' colunas E, F, G.");
    } catch (e) {
        alert("Erro técnico: " + e.message);
    }
    loader.style.display = 'none';
}

     let dadosOriginaisNuvem = null;

async function buscarDaNuvem() {
    document.getElementById('loader').style.display = 'flex';
    try {
        // Busca os dados da aba específica da loja
        const response = await fetch(`${URL_API}?loja=${encodeURIComponent(activeStore)}`);
        const dadosLoja = await response.json();
        
        if (dadosLoja && dadosLoja.length > 0) {
            // 1. Armazena uma cópia oculta para servir de BASE para o cálculo de diferença
            dadosOriginaisNuvem = JSON.parse(JSON.stringify(dadosLoja));
            
            // 2. Preenche o banco de dados da tela (db) para edição
            db = DATA_BASE.map(itemBase => {
                const itemNuvem = dadosLoja.find(n => n.id === itemBase.id);
                return { ...itemBase, qtd: itemNuvem ? itemNuvem.qtd : 0 };
            });
            
            diffCalculated = false; // Reseta o estado do botão de PDF
            render();
            alert(`Dados de ${activeStore} carregados! Agora você pode editar e calcular a diferença.`);
        } else {
            alert("Aba vazia ou loja não encontrada. Preencha os dados e salve primeiro.");
        }
    } catch (e) {
        console.error(e);
        alert("Erro ao buscar dados. Verifique a conexão.");
    }
    document.getElementById('loader').style.display = 'none';
}
        function abrirSelecaoProducao() {
            const modal = document.getElementById('modal-producao');
            const lista = document.getElementById('lista-lojas-modal');
            lista.innerHTML = '';
            stores.forEach(loja => {
                lista.innerHTML += `<label class="check-item"><input type="checkbox" value="${loja}" checked> ${loja}</label>`;
            });
            modal.style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-producao').style.display = 'none'; }

       async function importarProducaoConsolidada() {
    const selecionadas = Array.from(document.querySelectorAll('#lista-lojas-modal input:checked')).map(cb => cb.value);
    
    if (selecionadas.length === 0) return alert("Selecione ao menos uma loja.");
    
    document.getElementById('loader').style.display = 'flex';
    fecharModal();

    // Criamos um novo banco zerado para receber as somas
    let consolidadoLocal = DATA_BASE.map(item => ({ ...item, qtd: 0 }));

    try {
        // Fazemos um loop para buscar os dados de cada loja selecionada
        for (const loja of selecionadas) {
            const nomeAba = `${loja} - Produção`;
            const response = await fetch(`${URL_API}?loja=${encodeURIComponent(nomeAba)}`);
            const dadosLoja = await response.json();

            if (dadosLoja && dadosLoja.length > 0) {
                dadosLoja.forEach(itemNuvem => {
                    // Encontra o item correspondente no nosso consolidado e soma a quantidade
                    const itemNoDB = consolidadoLocal.find(i => i.id == itemNuvem.id);
                    if (itemNoDB) {
                        itemNoDB.qtd += (parseInt(itemNuvem.qtd) || 0);
                    }
                });
            }
        }

        // Atualiza a variável global 'db' com os novos valores somados
        db = consolidadoLocal;
        
        // Atualiza a tela para o usuário ver os valores
        render();
        
        alert("Produções importadas e somadas na tela com sucesso!");

    } catch (e) {
        console.error("Erro na importação:", e);
        alert("Erro ao buscar dados na nuvem. Verifique se as abas de produção existem.");
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}

function abrirImportacaoProducao() {
    const modal = document.getElementById('modal-producao');
    const lista = document.getElementById('lista-lojas-modal');
    lista.innerHTML = '';
    
    stores.forEach(loja => {
        lista.innerHTML += `
            <label class="check-item">
                <input type="checkbox" value="${loja}" checked> ${loja}
            </label>`;
    });
    
    // Configura o botão do modal para disparar a nova função de importação
    const btnConfirmar = modal.querySelector('.btn-prod');
    btnConfirmar.innerText = "IMPORTAR E SOMAR";
    btnConfirmar.onclick = importarProducaoConsolidada; // <--- Referência à nova função
    
    modal.style.display = 'flex';
}

function gerarPdfDaTela() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Estética Dark Gold
    doc.setFillColor(18, 18, 18); doc.rect(0, 0, 210, 297, 'F');
    doc.setTextColor(212, 175, 55); doc.setFontSize(16);
    doc.text("ORDEM DE PRODUÇÃO SENAGA", 105, 20, { align: 'center' });
    
    doc.setFontSize(10); doc.setTextColor(255, 255, 255);
    let y = 35;
    
    db.forEach(item => {
        if(item.qtd > 0) {
            // Nome na esquerda (x: 80) e Quantidade logo após (x: 130)
            // Ajuste esses dois números se quiser ainda mais perto ou longe
            doc.text(`${item.nome}:`, 55, y); 
            doc.text(String(item.qtd), 150, y);
            
            y += 8;
            if(y > 280) { 
                doc.addPage(); y = 20; 
                doc.setFillColor(18, 18, 18); doc.rect(0, 0, 210, 297, 'F'); 
                doc.setTextColor(255, 255, 255); // Garante que o texto continue branco na nova página
            }
        }
    });
    
    doc.save(`Producao_Final_${new Date().getTime()}.pdf`);
}
       function clearData() { 
            if(confirm('Isso limpará apenas a tela atual. Os dados na nuvem só serão alterados quando você clicar em SALVAR. Confirmar?')) { 
                // Reseta o banco de dados local para zero
                db = DATA_BASE.map(item => ({ ...item, qtd: 0 }));
                
                // Reseta o estado da diferença calculada
                diffCalculated = false;
                
                // Atualiza o LocalStorage com os valores zerados
                localStorage.setItem('salgados_db_v3', JSON.stringify(db));
                
                // Re-renderiza a tela
                render();
                
                console.log("Interface limpa. Dados na nuvem permanecem intactos até o próximo salvamento.");
            } 
        }

        renderStores();
        render();

    </script>
</body>
</html>
