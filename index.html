<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salgados Express - Gestão ID</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #D4AF37; --text: #ffffff; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--accent); margin-bottom: 20px; }
        h1 { color: var(--accent); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
        }
        .btn:active { background: var(--accent); color: var(--bg); }
        #inventory-list { display: grid; gap: 8px; }
        .item-card { background: var(--card); border-left: 4px solid var(--border); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-radius: 4px; }
        .item-card.active { border-left-color: var(--accent); }
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 40px; height: 40px; border-radius: 5px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 1.3rem; display: flex; align-items: center; justify-content: center; }
        .qty-input { width: 45px; text-align: center; background: transparent; border: none; color: white; font-size: 1rem; font-weight: bold; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        input[type="file"] { display: none; }
        .id-badge { font-size: 0.6rem; color: #666; margin-right: 5px; }
    </style>
</head>
<body>

    <header><h1>Estoque Profissional</h1></header>

    <div class="controls">
        <label class="btn" for="cam-capture">📸 ESCANEAR</label>
        <input type="file" id="cam-capture" accept="image/*" capture="environment">
        
        <button class="btn" onclick="exportPDF()">📄 PDF</button>
        
        <label class="btn" for="doc-import">📥 IMPORTAR</label>
        <input type="file" id="doc-import" accept=".json,application/json,.pdf,application/pdf">

        <button class="btn" onclick="clearData()" style="border-color: #666; color: #666;">ZERAR</button>
    </div>

    <div id="inventory-list"></div>

    <div class="loading-overlay" id="loader">
        <div style="color: var(--accent); margin-bottom: 10px;">Processando IDs e Soma...</div>
        <div id="progress" style="font-size: 1.5rem; color: white;">0%</div>
        <canvas id="pdf-canvas" style="display:none;"></canvas>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // LISTA COM IDs ÚNICOS PARA CADA PRODUTO
        const DATA_BASE = [
            { id: 1, nome: "Atum" }, { id: 2, nome: "Berinjela" }, { id: 3, nome: "Brasileiro" },
            { id: 4, nome: "Brócolis" }, { id: 5, nome: "Bauru" }, { id: 6, nome: "Carne com queijo" },
            { id: 7, nome: "Carne" }, { id: 8, nome: "Carne com cheddar" }, { id: 9, nome: "Calabresa" },
            { id: 10, nome: "Calabresa com catupiry" }, { id: 11, nome: "Caipira" }, { id: 12, nome: "Carne seca" },
            { id: 13, nome: "Chips" }, { id: 14, nome: "Escarola" }, { id: 15, nome: "Especial de carne" },
            { id: 16, nome: "Frango com catupiry" }, { id: 17, nome: "Mini de carne" }, { id: 18, nome: "Mini palmito" },
            { id: 19, nome: "Palmito" }, { id: 20, nome: "Palmito com catupiry" }, { id: 21, nome: "Pizza" },
            { id: 22, nome: "Portuguesa" }, { id: 23, nome: "Queijo" }, { id: 24, nome: "Quatro queijos" },
            { id: 25, nome: "Kibe" }, { id: 26, nome: "Bolinho de carne" }, { id: 27, nome: "Bolinho de bacalhau" },
            { id: 28, nome: "Bolinho de queijo" }, { id: 29, nome: "Coxinha" }, { id: 30, nome: "Risole" },
            { id: 31, nome: "Casquinha" }, { id: 32, nome: "Camarão" }, { id: 33, nome: "Pepperoni com queijo" },
            { id: 34, nome: "Pastel de carne com ovo" }, { id: 35, nome: "Especial de frango" }, { id: 36, nome: "Frango com queijo" },
            { id: 37, nome: "Milho com catupiry e queijo" }, { id: 38, nome: "Costela com queijo" }, 
            { id: 39, nome: "Bolinho de carne seca" }, { id: 40, nome: "Bolinho de brócolis com queijo" }, 
            { id: 41, nome: "Coxinha de catupiry" }
        ];

        let db = JSON.parse(localStorage.getItem('salgados_db_v2')) || DATA_BASE.map(item => ({ ...item, qtd: 0 }));

        function render() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            
            db.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `item-card ${item.qtd > 0 ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="item-name"><span class="id-badge">#${item.id}</span>${item.nome}</div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="upd(${item.id},-1)">-</button>
                        <input type="number" class="qty-input" value="${item.qtd}" onchange="set(${item.id},this.value)">
                        <button class="qty-btn" onclick="upd(${item.id},1)">+</button>
                    </div>`;
                list.appendChild(div);
            });
            localStorage.setItem('salgados_db_v2', JSON.stringify(db));
        }

        // Funções agora usam o ID em vez do INDEX para segurança total
        function upd(id, v) { 
            const item = db.find(i => i.id === id);
            if(item) { item.qtd = Math.max(0, (parseInt(item.qtd) || 0) + v); render(); }
        }
        function set(id, v) { 
            const item = db.find(i => i.id === id);
            if(item) { item.qtd = Math.max(0, parseInt(v) || 0); render(); }
        }
        function clearData() { if(confirm('Zerar tudo?')) { db.forEach(i => i.qtd = 0); render(); } }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 20;
            doc.setFillColor(18, 18, 18); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(212, 175, 55); doc.setFontSize(16); doc.text("ESTOQUE ATUALIZADO", 105, y, { align: 'center' });
            y += 15; doc.setFontSize(10); doc.setTextColor(255, 255, 255);
            
            db.forEach(item => {
                if(item.qtd > 0) {
                    if (y > 280) { doc.addPage(); doc.setFillColor(18, 18, 18); doc.rect(0, 0, 210, 297, 'F'); y = 20; }
                    doc.text(`${item.id} - ${item.nome}`, 20, y); 
                    doc.text(String(item.qtd), 180, y, { align: 'right' });
                    doc.setDrawColor(51, 51, 51); doc.line(20, y+2, 190, y+2); y += 8;
                }
            });

            const pdfBlob = doc.output('blob');
            const url = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a');
            a.href = url; a.download = 'estoque.pdf';
            document.body.appendChild(a); a.click();
            URL.revokeObjectURL(url); document.body.removeChild(a);
        }

        async function handleFile(file) {
            if(!file) return;
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                let source = file;
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.getElementById('pdf-canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    source = canvas.toDataURL('image/jpeg', 0.9);
                }

                const result = await Tesseract.recognize(source, 'por', {
                    logger: m => { if(m.status==='recognizing text') document.getElementById('progress').innerText = Math.round(m.progress*100)+'%'; }
                });

                const textLines = result.data.text.toLowerCase().split('\n');

                // Lógica de Reconhecimento Blindada por ID e Tamanho de Texto
                // Ordenamos a busca pelos nomes mais longos primeiro (ex: "Carne com queijo")
                const sortedSearch = [...db].sort((a, b) => b.nome.length - a.nome.length);

                textLines.forEach(line => {
                    for (let item of sortedSearch) {
                        const nomeSabor = item.nome.toLowerCase();
                        
                        // Se a linha contém o nome do sabor
                        if (line.includes(nomeSabor)) {
                            const match = line.match(/\d+/);
                            if (match) {
                                const valor = parseInt(match[0]);
                                
                                // Se for o item "Carne" (curto), ele não pode validar se a linha for "Carne com queijo"
                                if (item.nome === "Carne" && (line.includes("queijo") || line.includes("cheddar") || line.includes("seca") || line.includes("especial"))) {
                                    continue; 
                                }

                                item.qtd = (parseInt(item.qtd) || 0) + valor;
                                break; // Encontrou o sabor mais específico na linha, pula para a próxima linha
                            }
                        }
                    }
                });
            } catch (e) { console.error(e); alert("Erro na leitura."); }
            loader.style.display = 'none';
            render();
        }

        document.getElementById('cam-capture').onchange = e => handleFile(e.target.files[0]);
        
        document.getElementById('doc-import').onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.name.toLowerCase().endsWith('.json')) {
                const reader = new FileReader();
                reader.onload = ev => { 
                    try {
                        const imported = JSON.parse(ev.target.result);
                        imported.forEach(imp => {
                            // Busca pelo ID no import para garantir que seja o produto certo
                            let local = db.find(i => i.id === imp.id);
                            if(local) local.qtd = (parseInt(local.qtd) || 0) + (parseInt(imp.qtd) || 0);
                        });
                        render();
                    } catch(e) { alert("JSON Inválido"); }
                };
                reader.readAsText(file);
            } else { handleFile(file); }
        };

        render();
    </script>
</body>
</html>
